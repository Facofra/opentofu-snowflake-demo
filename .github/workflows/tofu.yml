name: "OpenTofu SDLC - Multiple Environments"

on:
  push:
    branches:
      - main
      - 'feature/*'
  workflow_dispatch: # Allows manual trigger for testing

permissions:
  contents: read
  id-token: write

jobs:

  call-tofu-base-dev-plan:
    concurrency:
      group: dev-group-plan
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base-plan.yml
    secrets:
      my_github_secret: ${{ secrets.my_github_secret_dev }}
    with:
      environment: DEV

  call-tofu-base-dev-apply:
    concurrency:
      group: dev-group-apply
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base-apply.yml
    secrets:
      my_github_secret: ${{ secrets.my_github_secret_dev }}
    with:
      environment: DEV

  call-tofu-base-qa-plan:
    needs: call-tofu-base-dev-apply
    concurrency:
      group: qa-group-plan
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base-plan.yml
    secrets:
      my_github_secret: ${{ secrets.my_github_secret_qa }}
    with:
      environment: QA

  call-tofu-base-qa-apply:
    needs: call-tofu-base-dev-apply
    concurrency:
      group: qa-group-apply
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base-apply.yml
    secrets:
      my_github_secret: ${{ secrets.my_github_secret_qa }}
    with:
      environment: QA


