name: "OpenTofu SDLC - Multiple Environments"

on:
  push:
    branches:
      - main
      - 'feature/*'
  workflow_dispatch: # Allows manual trigger for testing

jobs:

  call-tofu-base-qa:
    concurrency:
      group: qa-group
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base.yml
    environment: QA
    secrets:
      inherit: true
    with:
      environment: QA


  call-tofu-base-dev:
    concurrency:
      group: dev-group
      cancel-in-progress: true
    uses: ./.github/workflows/tofu-base.yml
    environment: DEV
    secrets:
      inherit: true
    with:
      environment: DEV

