name: "base plan 2"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets: 
      my_github_secret:
        required: true

jobs:
  # --- PLAN JOB ---
  # Runs automatically on every push to check for syntax and logic
  plan:
    name: "Tofu Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./snowflake
    env:
      TF_VAR_my_github_secret: ${{ secrets.my_github_secret }}
      TF_VAR_environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Tofu Plan
        run: |
          mkdir -p ${{ github.workspace }}/plans
          echo "subiendo mensaje a ${{ github.workspace }}/plans/snowflake-${{ inputs.environment }}"
          echo "mensaje guardado para ${{ inputs.environment }}" > ${{ github.workspace }}/plans/snowflake-${{ inputs.environment }}

      - name: Upload Tofu Plan
        uses: actions/upload-artifact@v4
        with:
          name: 'TF-Plan-${{ inputs.environment }}'
          path: ${{ github.workspace }}/plans/snowflake-${{ inputs.environment }}
          retention-days: 1